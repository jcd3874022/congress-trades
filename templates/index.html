<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Congress Trades</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--line:#30363d;--text:#e6edf3;--dim:#8b949e;--green:#3fb950;--red:#f85149;--blue:#58a6ff}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,system-ui,sans-serif;padding-bottom:60px}
header{padding:14px 16px 8px;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--line)}
h1{font-size:17px;font-weight:600}
.sub{color:var(--dim);font-size:12px;margin-top:2px}
nav{display:flex;gap:6px;margin-top:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{background:var(--card);color:var(--dim);border:1px solid var(--line);border-radius:16px;padding:6px 14px;font-size:13px;white-space:nowrap}
nav button.on{color:var(--text);border-color:var(--blue)}
#filters{display:flex;gap:6px;padding:10px 16px;flex-wrap:wrap}
#filters input,#filters select{background:var(--card);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px;min-width:0;flex:1}
main{padding:0 12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:8px 0}
.row1{display:flex;justify-content:space-between;gap:8px;font-weight:600;font-size:14px}
.row2{color:var(--dim);font-size:12px;margin-top:3px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.buy{color:var(--green)}.sell{color:var(--red)}
a{color:var(--blue);text-decoration:none;font-size:12px}
.badge{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:1px 6px;color:var(--dim)}
.tk{font-size:16px}
.names{color:var(--dim);font-size:12px;margin-top:4px;line-height:1.5}
.empty{color:var(--dim);text-align:center;padding:30px 0;font-size:13px}
.note{color:var(--dim);font-size:11px;padding:4px 16px 0}
</style>
</head>
<body>
<header>
  <h1>Congress Trades</h1>
  <div class="sub">House Clerk + Senate eFD &middot; STOCK Act PTR filings</div>
  <nav>
    <button data-tab="trades" class="on">Trades</button>
    <button data-tab="largest">Largest</button>
    <button data-tab="clusters">Clusters</button>
    <button data-tab="insiders">Insiders</button>
    <button data-tab="filings">Filings</button>
    <button data-tab="staff">Staff</button>
    <button data-tab="paper">Paper</button>
    <button data-tab="runs">Runs</button>
    <button data-tab="config">Config</button>
  </nav>
</header>
<div id="filters"></div>
<div id="note" class="note"></div>
<main id="main"></main>
<script>
let tab='trades', cfg={};
const $=s=>document.querySelector(s);
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const txCls=t=>/^p/i.test(t||'')?'buy':(/^s/i.test(t||'')?'sell':'');
const txLbl=t=>({'P':'BUY','S':'SELL','E':'EXCH'})[(t||'').charAt(0).toUpperCase()]||esc(t||'?');
const usd=n=>n==null?'?':'$'+Number(n).toLocaleString();
async function j(u){const r=await fetch(u);return r.json()}

const WINDOWS=[[30,'30d'],[60,'60d'],[90,'90d'],[180,'180d'],[365,'1y'],[0,'All']];
function windowSelect(id,def){return `<select id="${id}">`+WINDOWS.map(([v,l])=>`<option value="${v}" ${v==def?'selected':''}>${l}</option>`).join('')+`</select>`}

function filtersFor(t){
  const defWin=parseInt(cfg.dashboard_default_window_days||'90');
  if(t==='trades')return `<input id="f-ticker" placeholder="Ticker" autocapitalize="characters"><input id="f-member" placeholder="Member"><select id="f-chamber"><option value="">Both</option><option value="house">House</option><option value="senate">Senate</option></select>`;
  if(t==='insiders')return 'SEC Form 4 filings for tickers congress traded recently. P = open-market buy, S = sale.';
  if(t==='staff')return 'PTRs filed by non-members: Senate staff, candidates, former senators. Office shown as filed.';
  if(t==='paper')return 'Handwritten/scanned filings - no machine-readable text. Open the scan to read them.';
  if(t==='largest')return windowSelect('f-days',defWin)+`<select id="f-type"><option value="">All types</option><option value="buy">Buys</option><option value="sell">Sells</option></select><select id="f-chamber2"><option value="">Both</option><option value="house">House</option><option value="senate">Senate</option></select>`;
  if(t==='insiders')return `<input id="f-iticker" placeholder="Ticker" autocapitalize="characters"><select id="f-icode"><option value="">All codes</option><option value="P">Buys (P)</option><option value="S">Sells (S)</option></select>`+windowSelect('f-idays',defWin);
  if(t==='clusters')return windowSelect('f-days2',defWin)+`<input id="f-minbuyers" type="number" min="1" value="${parseInt(cfg.cluster_min_buyers||'2')}" style="max-width:90px" title="min buyers">`;
  return '';
}
function noteFor(t){
  if(t==='staff')return 'PTRs filed by non-members: Senate staff, candidates, former senators. Office shown as filed.';
  if(t==='paper')return 'Handwritten/scanned filings - no machine-readable text. Open the scan to read them.';
  if(t==='largest')return 'Ranked by statutory range floor - filings disclose ranges, not exact amounts.';
  if(t==='clusters')return 'Tickers bought by multiple members in the window. $ figures = sum of disclosed range floors-ceilings.';
  return '';
}

async function render(){
  const el=$('#main');el.innerHTML='<div class="empty">Loading…</div>';
  $('#filters').innerHTML=filtersFor(tab);
  $('#note').textContent=noteFor(tab);
  document.querySelectorAll('#filters input,#filters select').forEach(x=>x.addEventListener('change',draw));
  await draw();
}
async function draw(){
  const el=$('#main');
  if(tab==='trades'){
    const p=new URLSearchParams();
    if($('#f-ticker')?.value.trim())p.set('ticker',$('#f-ticker').value.trim());
    if($('#f-member')?.value.trim())p.set('member',$('#f-member').value.trim());
    if($('#f-chamber')?.value)p.set('chamber',$('#f-chamber').value);
    const d=await j('/api/trades?'+p);
    el.innerHTML=d.length?d.map(t=>`<div class="card">
      <div class="row1"><span>${esc(t.filer_name)}</span><span class="${txCls(t.transaction_type)}">${txLbl(t.transaction_type)} ${esc(t.amount_range||'')}</span></div>
      <div class="row2"><span>${esc(t.ticker||'')} ${esc(t.asset_name||'')}</span></div>
      <div class="row2"><span>tx ${esc(t.transaction_date||'?')} &middot; ${esc(t.chamber)}</span>
      <span><a href="${esc(t.source_url)}" target="_blank">source</a> <span class="badge">parser ${esc(t.parser_version)}</span></span></div>
    </div>`).join(''):'<div class="empty">No trades match.</div>';
  }else if(tab==='largest'){
    const p=new URLSearchParams({days:$('#f-days')?.value||'90',limit:'50'});
    if($('#f-type')?.value)p.set('type',$('#f-type').value);
    if($('#f-chamber2')?.value)p.set('chamber',$('#f-chamber2').value);
    const d=await j('/api/largest?'+p);
    el.innerHTML=d.length?d.map(t=>`<div class="card">
      <div class="row1"><span>${esc(t.filer_name)}</span><span class="${txCls(t.transaction_type)}">${txLbl(t.transaction_type)} ${esc(t.amount_range||'')}</span></div>
      <div class="row2"><span>${esc(t.ticker||'')} ${esc(t.asset_name||'')}</span></div>
      <div class="row2"><span>tx ${esc(t.transaction_date||'?')} &middot; ${esc(t.chamber)}</span>
      <span><a href="${esc(t.source_url)}" target="_blank">source</a></span></div>
    </div>`).join(''):'<div class="empty">No transactions in this window.</div>';
  }else if(tab==='clusters'){
    const p=new URLSearchParams({days:$('#f-days2')?.value||'90',min_buyers:$('#f-minbuyers')?.value||'2',limit:'50'});
    const d=await j('/api/clusters?'+p);
    el.innerHTML=d.length?d.map(c=>`<div class="card">
      <div class="row1"><span class="tk">${esc(c.ticker)}</span><span class="buy">${c.buyers} buyers &middot; ${c.buys} buys</span></div>
      <div class="row2"><span>est. ${usd(c.buy_floor)} - ${usd(c.buy_ceiling)}</span><span>${c.sells} sells in window</span></div>
      <div class="row2"><span>insiders: <span class="buy">${c.insider_buys} buys</span> / <span class="sell">${c.insider_sells} sells</span></span><span>${c.insider_buy_value?'insider buy $'+Number(c.insider_buy_value).toLocaleString(undefined,{maximumFractionDigits:0}):''}</span></div>
      <div class="names">${(c.buyer_names||[]).map(esc).join(', ')}</div>
    </div>`).join(''):'<div class="empty">No tickers meet the threshold in this window.</div>';
  }else if(tab==='insiders'){
    const p=new URLSearchParams({days:$('#f-idays')?.value||'90',limit:'100'});
    if($('#f-iticker')?.value.trim())p.set('ticker',$('#f-iticker').value.trim());
    if($('#f-icode')?.value)p.set('code',$('#f-icode').value);
    const d=await j('/api/insiders?'+p);
    el.innerHTML=d.length?d.map(t=>`<div class="card">
      <div class="row1"><span>${esc(t.insider_name||'?')}</span><span class="${t.transaction_code==='P'?'buy':(t.transaction_code==='S'?'sell':'')}">${esc(t.transaction_code||'?')} ${t.shares?Number(t.shares).toLocaleString():''} @ ${t.price?'$'+Number(t.price).toLocaleString():'?'}</span></div>
      <div class="row2"><span>${esc(t.ticker)} &middot; ${esc(t.insider_title||(t.is_director?'Director':''))}</span><span>${t.value?'$'+Number(t.value).toLocaleString(undefined,{maximumFractionDigits:0}):''}</span></div>
      <div class="row2"><span>tx ${esc(t.transaction_date||'?')} &middot; filed ${esc(t.filed_date||'?')}</span><span><a href="${esc(t.source_url)}" target="_blank">form 4</a></span></div>
    </div>`).join(''):'<div class="empty">No insider transactions yet - EDGAR pull may still be running.</div>';
  }else if(tab==='staff'){
    const d=await j('/api/trades?role=staff&limit=100');
    el.innerHTML=d.length?d.map(t=>`<div class="card">
      <div class="row1"><span>${esc(t.filer_name)}</span><span class="${txCls(t.transaction_type)}">${txLbl(t.transaction_type)} ${esc(t.amount_range||'')}</span></div>
      <div class="row2"><span>${esc(t.chamber_office||'')}</span></div>
      <div class="row2"><span>${esc(t.ticker||'')} ${esc(t.asset_name||'')}</span></div>
      <div class="row2"><span>tx ${esc(t.transaction_date||'?')}</span><span><a href="${esc(t.source_url)}" target="_blank">source</a></span></div>
    </div>`).join(''):'<div class="empty">No staff trades yet - the staff backfill may still be running (see Runs).</div>';
  }else if(tab==='paper'){
    const d=await j('/api/filings?status=paper_skipped&limit=200');
    el.innerHTML=d.length?d.map(f=>`<div class="card">
      <div class="row1"><span>${esc(f.filer_name)}</span><span class="badge">${esc(f.source)}</span></div>
      <div class="row2"><span>filed ${esc(f.filed_date||'?')}</span><span><a href="${esc(f.source_url)}" target="_blank">open scan</a></span></div>
    </div>`).join(''):'<div class="empty">No paper filings.</div>';
  }else if(tab==='filings'){
    const d=await j('/api/filings');
    el.innerHTML=d.length?d.map(f=>`<div class="card">
      <div class="row1"><span>${esc(f.filer_name)}</span><span class="badge">${esc(f.parse_status)}</span></div>
      <div class="row2"><span>${esc(f.source)} &middot; filed ${esc(f.filed_date||'?')} &middot; ${f.trade_count} trades</span>
      <span><a href="${esc(f.source_url)}" target="_blank">filing</a></span></div>
    </div>`).join(''):'<div class="empty">No filings yet.</div>';
  }else if(tab==='runs'){
    const d=await j('/api/runs');
    el.innerHTML=d.length?d.map(r=>`<div class="card">
      <div class="row1"><span>#${r.id} ${esc(r.source)}</span><span class="badge">${esc(r.status)}</span></div>
      <div class="row2"><span>${esc(r.started_at)}</span><span>+${r.new_filings_live ?? r.new_filings} filings / +${r.new_trades} trades / ${(r.errors||[]).length} errors</span></div>
    </div>`).join(''):'<div class="empty">No runs yet.</div>';
  }else{
    const d=await j('/api/config');
    el.innerHTML=d.map(c=>`<div class="card">
      <div class="row1"><span>${esc(c.key)}</span><input style="background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:6px;padding:4px 8px;width:40%" value="${esc(c.value)}" onchange="setCfg('${esc(c.key)}',this.value)"></div>
      <div class="row2"><span>${esc(c.description||'')}</span></div>
    </div>`).join('')+`<div class="card"><button style="width:100%;padding:10px;background:var(--blue);border:0;border-radius:8px;color:#fff;font-size:14px" onclick="runScrape()">Run scrape now</button></div>`;
  }
}
function token(){let t=localStorage.getItem('admin_token');if(!t){t=prompt('Admin token');if(t)localStorage.setItem('admin_token',t)}return t}
async function setCfg(k,v){await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Token':token()},body:JSON.stringify({key:k,value:v})});cfg[k]=v}
async function runScrape(){const r=await fetch('/api/scrape',{method:'POST',headers:{'X-Admin-Token':token()}});alert((await r.json()).started?'Scrape started':'Failed')}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on');tab=b.dataset.tab;render()});
(async()=>{try{(await j('/api/config')).forEach(c=>cfg[c.key]=c.value)}catch(e){}render()})();
</script>
</body>
</html>
